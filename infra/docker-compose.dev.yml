# ArcaAI B1 dev stack - PostgreSQL + MLflow (ruling R4: Postgres from day 1; TI4: MLflow self-hosted).
# Usage: scripts\dev_up.cmd   (or: docker compose -f infra/docker-compose.dev.yml up -d)
name: arcaai-dev

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arcaai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arcaai-dev-only}
      POSTGRES_DB: ${POSTGRES_DB:-arcaai}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arcaai}"]
      interval: 5s
      timeout: 3s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_URI: postgresql+psycopg2://${POSTGRES_USER:-arcaai}:${POSTGRES_PASSWORD:-arcaai-dev-only}@postgres:5432/mlflow
    command: >
      bash -lc "pip install --quiet psycopg2-binary &&
      mlflow server --backend-store-uri $$MLFLOW_BACKEND_URI
      --artifacts-destination /mlartifacts --host 0.0.0.0 --port 5000"
    volumes:
      - mlartifacts:/mlartifacts
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
  mlartifacts:
